<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1722"/>
      <stop offset="0.5" stop-color="#102234"/>
      <stop offset="1" stop-color="#16304a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#1a3656" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1a3656" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <!-- faint cartographic grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0"   y1="216" x2="1920" y2="216"/>
    <line x1="0"   y1="432" x2="1920" y2="432"/>
    <line x1="0"   y1="648" x2="1920" y2="648"/>
    <line x1="0"   y1="864" x2="1920" y2="864"/>
    <line x1="384"  y1="0" x2="384"  y2="1080"/>
    <line x1="768"  y1="0" x2="768"  y2="1080"/>
    <line x1="1152" y1="0" x2="1152" y2="1080"/>
    <line x1="1536" y1="0" x2="1536" y2="1080"/>
  </g>
</svg>
